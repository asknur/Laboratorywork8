server:
  port: 8089

spring:
  application:
    name: Quiz-java27

  datasource:
    url: jdbc:h2:./db/test;AUTO_SERVER=TRUE
    username: root
    password: 1234
    driver-class-name: org.h2.Driver
  #    sql:
  #      init:
  #        mode: always
  liquibase:
    change-log: classpath:/db/changelog/master.yaml

logging:
  file:
    path: logs
  level:
    kg.attractor.jobsearchjava27: debug
    com.zaxxer.hikari: error
    org.apache.tomcat: error
    liquibase: error
    root: info
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"